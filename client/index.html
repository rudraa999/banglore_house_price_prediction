<!DOCTYPE html>
<html>
<head>
    <title>Bangalore House Price Predictor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
            text-align: center;
            padding: 40px;
        }

        .container {
            background: white;
            color: black;
            padding: 30px;
            border-radius: 12px;
            width: 400px;
            margin: auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            margin-bottom: 20px;
        }

        input, select {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px;
            width: 95%;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5a67d8;
        }

        .result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            color: #2d3748;
        }

        .loader {
            display: none;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>🏠 Banglore House Price Predictor</h2>

    <input type="number" id="sqft" placeholder="Area (sqft)">
    <input type="number" id="bhk" placeholder="BHK">
    <input type="number" id="bath" placeholder="Bath">

    <select id="location"></select>

    <button onclick="predictPrice()">Predict Price</button>

    <div class="loader" id="loader">⏳ Predicting...</div>

    <div class="result" id="result"></div>
</div>

<script>
function loadLocations() {
    fetch("http://127.0.0.1:5000/get_location_names")
    .then(res => res.json())
    .then(data => {
        let dropdown = document.getElementById("location");

        data.locations.forEach(loc => {
            let option = document.createElement("option");
            option.text = loc;
            dropdown.add(option);
        });
    });
}

function predictPrice() {
    let sqft = document.getElementById("sqft").value;
    let bhk = document.getElementById("bhk").value;
    let bath = document.getElementById("bath").value;
    let location = document.getElementById("location").value;

    if (!sqft || !bhk || !bath) {
        alert("Please fill all fields!");
        return;
    }

    document.getElementById("loader").style.display = "block";
    document.getElementById("result").innerText = "";

    let formData = new FormData();
    formData.append("total_sqft", sqft);
    formData.append("bhk", bhk);
    formData.append("bath", bath);
    formData.append("location", location);

    fetch("http://127.0.0.1:5000/predict_home_price", {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("loader").style.display = "none";
        document.getElementById("result").innerText =
            "💰 Estimated Price: ₹ " + data.estimated_price + " Lakhs";
    });
}

loadLocations();
</script>

</body>
</html>
